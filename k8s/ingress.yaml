apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: vorja-ingress
  namespace: vorja
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
    nginx.ingress.kubernetes.io/proxy-body-size: "10m"
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - vorja.ja-zum-leben.at
      secretName: vorja-tls
  rules:
    - host: vorja.ja-zum-leben.at
      http:
        paths:
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: vorja-backend
                port:
                  number: 8000
          - path: /admin
            pathType: Prefix
            backend:
              service:
                name: vorja-backend
                port:
                  number: 8000
          - path: /media
            pathType: Prefix
            backend:
              service:
                name: vorja-backend
                port:
                  number: 8000
          - path: /
            pathType: Prefix
            backend:
              service:
                name: vorja-frontend
                port:
                  number: 80
